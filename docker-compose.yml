version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: openfield
      POSTGRES_PASSWORD: openfield
      POSTGRES_DB: openfield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfield -d openfield"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
